<!-- 제주도 페이지 전용 스타일 -->
<style>
    .region-card {
        transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        border: 1px solid #f1f5f9;
        background: white;
    }
    .region-card:active {
        transform: scale(0.96);
        background-color: #fff7ed; /* 제주의 귤색 포인트 컬러 반영 */
    }
    
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .animate-fadeIn {
        animation: fadeIn 0.5s ease-out forwards;
    }
</style>

<!-- 본문 컨텐츠 영역 -->
<div class="opacity-0 animate-fadeIn">
    <!-- Guide Section -->
    <section class="px-6 py-8">
        <h2 id="jeju-guide-main" class="text-2xl font-black text-slate-900 leading-tight tracking-tight">
            환상의 섬, 제주도의<br>미션을 시작하세요!
        </h2>
        <p id="jeju-guide-sub" class="text-slate-500 mt-2 text-sm font-bold">탐험하고 싶은 지역을 선택해 주세요.</p>
    </section>

    <!-- Region Cards Grid -->
    <section class="px-4 grid grid-cols-2 gap-4">
        <!-- 제주시 권역 -->
        <div class="region-card rounded-3xl p-6 shadow-sm flex flex-col items-center justify-center text-center cursor-pointer min-h-[140px]" onclick="alert('제주시 미션 준비 중!')">
            <div class="text-3xl mb-2">🗿</div>
            <span id="label-jeju" class="text-sm font-black text-slate-900">제주시 권역</span>
            <p id="desc-jeju" class="text-[10px] text-slate-400 font-bold mt-1">공항 · 애월 · 함덕</p>
        </div>

        <!-- 서귀포 권역 -->
        <div class="region-card rounded-3xl p-6 shadow-sm flex flex-col items-center justify-center text-center cursor-pointer min-h-[140px]" onclick="alert('서귀포 미션 준비 중!')">
            <div class="text-3xl mb-2">🍊</div>
            <span id="label-seogwipo" class="text-sm font-black text-slate-900">서귀포 권역</span>
            <p id="desc-seogwipo" class="text-[10px] text-slate-400 font-bold mt-1">중문 · 올레시장 · 남원</p>
        </div>

        <!-- 동부 & 부속섬 -->
        <div class="region-card rounded-3xl p-6 shadow-sm flex flex-col items-center justify-center text-center cursor-pointer min-h-[140px]" onclick="alert('동부 미션 준비 중!')">
            <div class="text-3xl mb-2">🏝️</div>
            <span id="label-east" class="text-sm font-black text-slate-900">동부 & 부속섬</span>
            <p id="desc-east" class="text-[10px] text-slate-400 font-bold mt-1">성산 · 우도 · 구좌</p>
        </div>

        <!-- 서부 & 부속섬 -->
        <div class="region-card rounded-3xl p-6 shadow-sm flex flex-col items-center justify-center text-center cursor-pointer min-h-[140px]" onclick="alert('서부 미션 준비 중!')">
            <div class="text-3xl mb-2">⛴️</div>
            <span id="label-west" class="text-sm font-black text-slate-900">서부 & 부속섬</span>
            <p id="desc-west" class="text-[10px] text-slate-400 font-bold mt-1">한림 · 가파도 · 마라도</p>
        </div>
    </section>

    <!-- Info Card -->
    <section class="px-5 my-10">
        <div class="bg-orange-500 rounded-3xl p-6 flex items-start gap-4 shadow-xl shadow-orange-100">
            <div class="text-xl bg-white/20 p-2 rounded-xl">💡</div>
            <div>
                <h4 id="info-title" class="text-sm font-black text-white">제주도 여행 꿀팁</h4>
                <p id="info-desc" class="text-xs text-orange-50 mt-2 leading-relaxed font-medium">
                    제주의 바람과 자연을 느끼고 싶다면 <span class='font-black underline'>부속 섬</span> 탐방을, <br>
                    로컬 맛집과 문화를 즐기려면 <span class='font-black underline'>제주시/서귀포</span> 시장 투어를 추천해요!
                </p>
            </div>
        </div>
    </section>
</div>

                seogwipo: "서귀포 권역", seogwipoDesc: "중문 · 올레시장 · 남원",
                east: "동부 & 부속섬", eastDesc: "성산 · 우도 · 구좌",
                west: "서부 & 부속섬", westDesc: "한림 · 가파도 · 마라도",
                infoTitle: "제주도 여행 꿀팁",
                infoDesc: "제주의 바람과 자연을 느끼고 싶다면 <span class='font-black underline'>부속 섬</span> 탐방을, 로컬 맛집과 문화를 즐기려면 <span class='font-black underline'>제주시/서귀포</span> 시장 투어를 추천해요!"
            },

                seogwipo: "Seogwipo Area", seogwipoDesc: "Jungmun, Market, Namwon",

        const currentLang = localStorage.getItem('selectedLang') || 'KO';

        // 텍스트 업데이트
        document.getElementById('jeju-guide-main').innerHTML = data.guideMain;
        document.getElementById('jeju-guide-sub').innerText = data.guideSub;
