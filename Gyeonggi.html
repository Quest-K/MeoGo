<style>

.region-card {

border: 1px solid #f1f5f9;
}
.region-card:active {
transform: scale(0.96);
background-color: #f0fbff;
}
</style>

<div class="animate-in slide-in-from-bottom-4">
<!-- Guide Section -->
<section class="px-6 py-8">
<h2 id="guide-main" class="text-2xl font-black text-slate-900 leading-tight tracking-tight">
경기도의 숨겨진

</h2>
<p id="guide-sub" class="text-slate-500 mt-2 text-sm font-bold">탐험하고 싶은 지역을 선택해 주세요.</p>
</section>

<!-- Region Cards Grid -->
<section class="px-4 grid grid-cols-2 gap-4">
    <!-- 북부 -->
    <div class="region-card bg-white rounded-3xl p-6 shadow-sm flex flex-col items-center justify-center text-center cursor-pointer min-h-[140px]" onclick="alert('Coming soon!')">
        <div class="text-3xl mb-2">🎡</div>
        <span id="label-north" class="text-sm font-black text-slate-900">북부</span>
        <p id="desc-north" class="text-[10px] text-slate-400 font-bold mt-1">고양 · 파주 · 의정부</p>
    </div>

    <!-- 남부 -->
    <div class="region-card bg-white rounded-3xl p-6 shadow-sm flex flex-col items-center justify-center text-center cursor-pointer min-h-[140px]" onclick="alert('Coming soon!')">
        <div class="text-3xl mb-2">🏰</div>
        <span id="label-south" class="text-sm font-black text-slate-900">남부</span>
        <p id="desc-south" class="text-[10px] text-slate-400 font-bold mt-1">수원 · 용인 · 화성</p>
    </div>

    <!-- 서부 -->
    <div class="region-card bg-white rounded-3xl p-6 shadow-sm flex flex-col items-center justify-center text-center cursor-pointer min-h-[140px]" onclick="alert('Coming soon!')">
        <div class="text-3xl mb-2">🌊</div>
        <span id="label-west" class="text-sm font-black text-slate-900">서부</span>
        <p id="desc-west" class="text-[10px] text-slate-400 font-bold mt-1">안산 · 안양 · 시흥</p>
    </div>

    <!-- 동부 -->
    <div class="region-card bg-white rounded-3xl p-6 shadow-sm flex flex-col items-center justify-center text-center cursor-pointer min-h-[140px]" onclick="alert('Coming soon!')">
        <div class="text-3xl mb-2">🖼️</div>
        <span id="label-east" class="text-sm font-black text-slate-900">동부</span>
        <p id="desc-east" class="text-[10px] text-slate-400 font-bold mt-1">가평 · 양평</p>
    </div>
</section>

<!-- Info Card -->
<section class="px-5 my-10">
    <div class="bg-indigo-600 rounded-3xl p-6 flex items-start gap-4 shadow-xl shadow-indigo-100">
        <div class="text-xl bg-white/20 p-2 rounded-xl">💡</div>
        <div>
            <h4 id="info-title" class="text-sm font-black text-white">경기도 추천 코스</h4>
            <p id="info-desc" class="text-xs text-indigo-50 mt-2 leading-relaxed font-medium">
                가족 여행이라면 <span class='font-black underline'>수원 화성</span>이나 <span class='font-black underline'>용인 에버랜드</span>를, <br>
                자연 속 힐링은 <span class='font-black underline'>가평/양평</span> 코스를 추천해요!
            </p>
        </div>
    </div>
</section>


</div>

<script>
(function() {
const i18n = {
KO: {
guideMain: "경기도의 숨겨진



매력을 찾아보세요!",
guideSub: "탐험하고 싶은 지역을 선택해 주세요.",
north: "북부", northDesc: "고양 · 파주 · 의정부",
south: "남부", southDesc: "수원 · 용인 · 화성",
west: "서부", westDesc: "안산 · 안양 · 시흥",
east: "동부", eastDesc: "가평 · 양평",
infoTitle: "경기도 추천 코스",
infoDesc: "가족 여행이라면 <span class='font-black underline'>수원 화성</span>이나 <span class='font-black underline'>용인 에버랜드</span>를, 자연 속 힐링은 <span class='font-black underline'>가평/양평</span> 코스를 추천해요!"
},
EN: {
guideMain: "Find the hidden



charms of Gyeonggi!",
guideSub: "Please select the area you want to explore.",
north: "North", northDesc: "Goyang, Paju, Uijeongbu",
south: "South", southDesc: "Suwon, Yongin, Hwaseong",
west: "West", westDesc: "Ansan, Anyang, Siheung",
east: "East", eastDesc: "Gapyeong, Yangpyeong",
infoTitle: "Recommended Courses",
infoDesc: "Try <span class='font-black underline'>Suwon Hwaseong</span> or <span class='font-black underline'>Everland</span> for family trips, or heal in <span class='font-black underline'>Gapyeong/Yangpyeong</span>!"
},
JP: {
guideMain: "京畿道の隠れた



魅력을 찾아보세요！",
guideSub: "探検したい区域を選択してください。",
north: "北部", northDesc: "高陽 · 坡州 · 議政府",
south: "南部", southDesc: "水原 · 龍仁 · 華城",
west: "西部", westDesc: "安山 · 安養 · 始興",
east: "東部", eastDesc: "加平 · 楊平",
infoTitle: "京畿道おすすめコース",
infoDesc: "家族旅行なら <span class='font-black underline'>水原華城</span>や <span class='font-black underline'>龍仁エ버랜드</span>を, 自然の中の癒やしは <span class='font-black underline'>加平/楊平</span>コースをおすすめします！"
}
};

function applyLanguage() {
    const lang = localStorage.getItem(&#39;selectedLang&#39;) || &#39;KO&#39;;
    const data = i18n[lang];
    if (data) {
        const elGuideMain = document.getElementById(&#39;guide-main&#39;);
        const elGuideSub = document.getElementById(&#39;guide-sub&#39;);
        const elLabelNorth = document.getElementById(&#39;label-north&#39;);
        const elDescNorth = document.getElementById(&#39;desc-north&#39;);
        const elLabelSouth = document.getElementById(&#39;label-south&#39;);
        const elDescSouth = document.getElementById(&#39;desc-south&#39;);
        const elLabelWest = document.getElementById(&#39;label-west&#39;);
        const elDescWest = document.getElementById(&#39;desc-west&#39;);
        const elLabelEast = document.getElementById(&#39;label-east&#39;);
        const elDescEast = document.getElementById(&#39;desc-east&#39;);
        const elInfoTitle = document.getElementById(&#39;info-title&#39;);
        const elInfoDesc = document.getElementById(&#39;info-desc&#39;);

        if(elGuideMain) elGuideMain.innerHTML = data.guideMain;
        if(elGuideSub) elGuideSub.innerText = data.guideSub;
        if(elLabelNorth) elLabelNorth.innerText = data.north;
        if(elDescNorth) elDescNorth.innerText = data.northDesc;
        if(elLabelSouth) elLabelSouth.innerText = data.south;
        if(elDescSouth) elDescSouth.innerText = data.southDesc;
        if(elLabelWest) elLabelWest.innerText = data.west;
        if(elDescWest) elDescWest.innerText = data.westDesc;
        if(elLabelEast) elLabelEast.innerText = data.east;
        if(elDescEast) elDescEast.innerText = data.eastDesc;
        if(elInfoTitle) elInfoTitle.innerText = data.infoTitle;
        if(elInfoDesc) elInfoDesc.innerHTML = data.infoDesc;
    }
}

// 초기 실행
applyLanguage();

// index.html에서 언어 변경 시 이벤트를 감지하기 위한 interval (또는 커스텀 이벤트)
// 여기서는 간단하게 0.5초마다 localStorage를 확인하거나, 
// 부모창의 언어변경 버튼에 이 applyLanguage를 연결하는 방식이 권장됩니다.
window.addEventListener(&#39;storage&#39;, (e) =&gt; {
    if (e.key === &#39;selectedLang&#39;) {
        applyLanguage();
    }
});


})();
</script>
