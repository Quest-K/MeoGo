<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MeoGo | Explore Korea</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;900&display=swap');
        body { font-family: 'Pretendard', sans-serif; -webkit-tap-highlight-color: transparent; letter-spacing: -0.02em; overflow-x: hidden; }
        
        :root {
            --brand-navy: #0A1931;
            --brand-green: #1E5128;
            --point-yellow: #facc15;
        }

        .text-brand-navy { color: var(--brand-navy); }
        .text-brand-green { color: var(--brand-green); }
        .hero-gradient { background: linear-gradient(135deg, var(--brand-navy) 0%, var(--brand-green) 100%); }

        /* 하단 네비게이션 스타일 */
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; font-size: 0.75rem; font-weight: 700; color: #94a3b8; transition: all 0.2s; cursor: pointer; }
        .nav-item i { font-size: 1.25rem; margin-bottom: 4px; }
        .nav-item.active { color: var(--brand-green); }

        /* 페이지 전환 애니메이션 */
        .page-fade { animation: fadeIn 0.35s ease-out; }
        @keyframes fadeIn { 
            from { opacity: 0; transform: translateY(8px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        ::-webkit-scrollbar { display: none; }
        .stat-tab { cursor: pointer; padding: 6px 12px; border-radius: 99px; font-size: 11px; font-weight: 800; }
        .stat-tab.active { background-color: var(--brand-navy); color: white; }
        .stat-content { display: none; }
        .stat-content.active { display: block; }
    </style>
</head>
<body class="bg-[#F8FAFC]">
    <div class="max-w-2xl mx-auto min-h-screen flex flex-col bg-white shadow-2xl relative">
        
        <header class="px-6 py-5 flex justify-between items-center sticky top-0 bg-white/95 z-50 backdrop-blur-md border-b border-slate-50">
            <h1 class="text-2xl font-900 text-brand-navy tracking-tighter italic cursor-pointer" onclick="loadPage('home')">MeoGo</h1>
            <div id="user-status" class="text-xs font-800 text-slate-400">Loading...</div>
        </header>

        <main id="content-area" class="flex-grow pb-32">
            </main>

        <nav class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-2xl bg-white/80 border-t border-slate-100 px-6 py-5 flex justify-between items-center z-50 rounded-t-[2.5rem] shadow-[0_-10px_40px_rgba(0,0,0,0.08)] backdrop-blur-xl">
            <div onclick="loadPage('home')" id="nav-home" class="nav-item active">
                <i class="fa-solid fa-house"></i><span>홈</span>
            </div>
            <div onclick="loadPage('mission')" id="nav-mission" class="nav-item">
                <i class="fa-solid fa-compass"></i><span>탐색</span>
            </div>
            <div onclick="loadPage('wishlist')" id="nav-wish" class="nav-item">
                <i class="fa-solid fa-heart"></i><span>찜</span>
            </div>
            <div onclick="loadPage('mypage')" id="nav-my" class="nav-item">
                <i class="fa-solid fa-circle-user"></i><span>마이</span>
            </div>
        </nav>
    </div>

    <script>
        const SUPABASE_URL = 'https://xyyoeovwrkcwhwdmjeyx.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_Jm_XX_GapNRJEdlQGBP7hw_JqdtHkjX';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        /**
         * 페이지 전환 핵심 함수
         */
        async function loadPage(pageName) {
            const contentArea = document.getElementById('content-area');
            
            // 1. 네비게이션 활성 상태 업데이트
            document.querySelectorAll('.nav-item').forEach(nav => nav.classList.remove('active'));
            const targetNavId = pageName === 'home' ? 'nav-home' : 
                                pageName === 'mission' ? 'nav-mission' : 
                                pageName === 'wishlist' ? 'nav-wish' : 'nav-my';
            document.getElementById(targetNavId)?.classList.add('active');

            // 2. 콘텐츠 렌더링
            if (pageName === 'home') {
                contentArea.innerHTML = `<div class="page-fade">${renderHomeHtml()}</div>`;
                initHomeData(); // 홈 전용 데이터 로드
            } else {
                // 로딩 표시
                contentArea.innerHTML = `<div class="flex justify-center items-center py-20 text-slate-300"><i class="fa-solid fa-circle-notch fa-spin text-3xl"></i></div>`;
                
                try {
                    // 동일 폴더의 html 파일을 가져옴
                    const response = await fetch(`./${pageName}.html`);
                    if (!response.ok) throw new Error('File not found');
                    
                    const htmlText = await response.text();
                    const parser = new DOMParser();
                    const doc = parser.parseFromString(htmlText, 'text/html');
                    
                    // 불러온 파일에서 <main> 태그 안쪽만 추출 (없으면 body 전체)
                    const newHtml = doc.querySelector('main') ? doc.querySelector('main').innerHTML : doc.body.innerHTML;
                    
                    contentArea.innerHTML = `<div class="page-fade">${newHtml}</div>`;
                    
                    // 만약 mission.html 로드 시 실행해야 할 스크립트가 있다면 여기서 트리거 가능
                    // 예: if(pageName === 'mission') initMissionPage();
                } catch (err) {
                    console.error("Page Load Error:", err);
                    contentArea.innerHTML = `<div class="p-10 text-center text-slate-400">페이지를 찾을 수 없습니다. (${pageName}.html)</div>`;
                }
            }
            window.scrollTo(0, 0);
        }

        /**
         * 홈 화면 기본 구조 (정적)
         */
        function renderHomeHtml() {
            return `
            <div class="px-6 py-4">
                <div class="hero-gradient rounded-[2.5rem] p-8 text-white shadow-xl relative overflow-hidden mb-8">
                    <div class="flex justify-between items-end relative z-10">
                        <div class="acrostic-container">
                            <div class="flex items-baseline"><span class="font-900 text-xl text-yellow-400 mr-1">M</span><span class="font-700 text-sm">ission</span></div>
                            <div class="flex items-baseline"><span class="font-900 text-xl text-yellow-400 mr-1">e</span><span class="font-700 text-sm">xperience</span></div>
                            <div class="flex items-baseline"><span class="font-900 text-xl text-yellow-400 mr-1">o</span><span class="font-700 text-sm">rdinary</span></div>
                            <div class="text-3xl font-900 text-emerald-400 mt-2">GO <span class="text-white">KOREA</span></div>
                        </div>
                        <button onclick="loadPage('mission')" class="bg-white text-brand-navy px-6 py-3 rounded-full font-900 text-sm shadow-lg active:scale-95 transition-transform">Start Now</button>
                    </div>
                </div>

                <div class="flex justify-between items-center mb-5 px-1">
                    <h3 class="text-lg font-900 text-brand-navy tracking-tight">Today's Hot Missions</h3>
                    <button onclick="loadPage('mission')" class="text-sm font-800 text-slate-400">View All</button>
                </div>
                
                <div id="featured-list" class="space-y-4">
                    <div class="animate-pulse bg-slate-50 h-24 rounded-3xl"></div>
                    <div class="animate-pulse bg-slate-50 h-24 rounded-3xl"></div>
                </div>
            </div>`;
        }

        /**
         * 홈 전용 실시간 데이터 로드 (Supabase)
         */
        async function initHomeData() {
            // 유저 세션 확인
            const { data: { session } } = await _supabase.auth.getSession();
            const statusEl = document.getElementById('user-status');
            if (session) {
                statusEl.innerText = session.user.email.split('@')[0];
            } else {
                statusEl.innerHTML = `<span onclick="loadPage('mypage')" class="text-brand-green font-900 underline cursor-pointer">Sign In</span>`;
            }

            // 미션 리스트 로드
            const { data } = await _supabase.from('missions').select('*').limit(3);
            const listDiv = document.getElementById('featured-list');
            if (data && listDiv) {
                listDiv.innerHTML = data.map(m => `
                    <div class="bg-white border border-slate-100 p-5 rounded-3xl flex items-center gap-4 shadow-sm active:scale-[0.98] transition-transform cursor-pointer" onclick="loadPage('mission')">
                        <div class="w-14 h-14 bg-slate-50 rounded-2xl flex items-center justify-center text-2xl">
                            ${m.category.includes('음식') ? '🍱' : m.category.includes('자연') ? '⛰️' : '🏛️'}
                        </div>
                        <div class="flex-grow">
                            <h4 class="font-900 text-brand-navy text-sm mb-1">${m.mission_name}</h4>
                            <p class="text-[10px] font-800 text-slate-400 uppercase tracking-widest">${m.region} · ${m.category}</p>
                        </div>
                        <div class="text-brand-green font-900 text-xs">${m.base_points}P</div>
                    </div>
                `).join('');
            }
        }

        // 초기 실행
        window.onload = () => loadPage('home');
    </script>
</body>
</html>
