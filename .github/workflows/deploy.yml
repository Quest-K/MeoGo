# 워크플로우 이름: GitHub Pages 배포
name: Deploy to GitHub Pages

# 실행 조건: 'main' 브랜치에 코드가 push(업로드)될 때마다 실행
on:
  push:
    branches:
      - main

# 깃허브 가상 컴퓨터가 배포를 수행할 수 있도록 권한 부여
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  # 1단계: 빌드 (소스 코드를 실제 웹 파일로 변환)
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4 # 프로젝트 코드를 가져옴

      - name: Set up Node
        uses: actions/setup-node@v4 # 리액트 빌드 도구인 Node.js 설치
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install # 필요한 라이브러리(재료) 설치

      - name: Build
        run: npm run build # 실제 웹사이트용 'dist' 폴더 생성 (가장 중요)

      - name: Setup Pages
        uses: actions/configure-pages@v4 # 깃허브 페이지 배포 설정

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist' # 빌드된 'dist' 폴더를 배포 대기 상태로 업로드

  # 2단계: 배포 (빌드된 파일을 실제 주소로 공개)
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build # build 작업이 성공해야만 실행됨
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4 # 최종적으로 웹사이트 공개