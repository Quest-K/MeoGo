<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quest-K | Missions</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;900&display=swap');
        body { font-family: 'Pretendard', sans-serif; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .pb-safe { padding-bottom: calc(6rem + env(safe-area-inset-bottom)); }
        .mission-card { background: white; border: 1px solid #e2e8f0; border-radius: 1.25rem; padding: 1.5rem; margin-bottom: 1rem; animation: fadeIn 0.4s ease-out; box-shadow: 0 4px 6px -1px rgba(10, 25, 49, 0.02); }
        .tag { font-size: 0.65rem; font-weight: 800; padding: 3px 10px; border-radius: 8px; margin-right: 6px; background: #F1F8F5; color: #1E5128; }
    </style>
</head>
<body class="bg-[#F8FAFC] text-[#1A202C]">

    <div class="max-w-2xl mx-auto min-h-screen flex flex-col bg-white shadow-xl relative">
        
        <header class="bg-white/95 backdrop-blur-md px-5 py-4 flex items-center sticky top-0 z-[100] border-b border-slate-100">
            <button onclick="location.href='index.html'" class="p-2 -ml-2 rounded-full hover:bg-slate-100 transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-[#0A1931]" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path d="M15 19l-7-7 7-7" /></svg>
            </button>
            <h1 id="page-title" class="text-xl font-800 ml-2 text-[#0A1931]">Loading...</h1>
        </header>

        <main id="mission-container" class="flex-grow p-6 pb-safe overflow-y-auto">
            <div id="loading-spinner" class="flex flex-col items-center justify-center h-64">
                <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-[#1E5128] mb-4"></div>
            </div>
            <div id="mission-items"></div>
        </main>

    </div>

    <script>
        const SUPABASE_URL = 'https://xyyoeovwrkcwhwdmjeyx.supabase.co'; 
        const SUPABASE_ANON_KEY = 'sb_publishable_Jm_XX_GapNRJEdlQGBP7hw_JqdtHkjX';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        window.onload = async () => {
            const params = new URLSearchParams(window.location.search);
            const type = params.get('type');
            const value = params.get('value');

            if (type && value) {
                document.getElementById('page-title').innerText = value;
                await fetchMissions(type, value);
            } else {
                location.href = 'index.html';
            }
        };

        async function fetchMissions(type, value) {
            const { data, error } = await _supabase.from('missions').select('*').eq(type, value);
            
            document.getElementById('loading-spinner').classList.add('hidden');
            const container = document.getElementById('mission-items');

            if (error || !data || data.length === 0) {
                container.innerHTML = '<div class="py-20 text-center"><p class="text-slate-400 font-700">등록된 미션이 없습니다.</p></div>';
                return;
            }

            data.forEach(item => {
                const el = document.createElement('div');
                el.className = 'mission-card';
                el.innerHTML = `
                    <div class="flex justify-between items-start mb-3">
                        <span class="tag">${item.category}</span>
                        <span class="text-[10px] text-slate-400 font-bold uppercase tracking-wider">${item.region}</span>
                    </div>
                    <h4 class="font-800 text-lg mb-2 text-[#0A1931]">${item.mission_name}</h4>
                    <p class="text-sm text-slate-500 leading-relaxed mb-5">${item.guide}</p>
                    <div class="flex justify-between items-center pt-4 border-t border-slate-50">
                        <span class="text-[#1E5128] font-900 text-base">100P</span>
                        <button onclick="acceptMission('${item.mission_id}')" class="bg-[#1E5128] text-white text-xs px-6 py-2.5 rounded-full font-800 shadow-md active:scale-95 transition-all">도전하기</button>
                    </div>
                `;
                container.appendChild(el);
            });
        }

        function acceptMission(id) {
            alert('미션에 도전합니다!');
        }
    </script>
</body>
</html>
