<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quest-K | Missions</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;900&display=swap');
        body { font-family: 'Pretendard', sans-serif; letter-spacing: -0.02em; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .fade-in { animation: fadeIn 0.4s ease-out; }
        
        .pb-safe { padding-bottom: calc(2rem + env(safe-area-inset-bottom)); }
        
        .mission-card { background: white; border: 1px solid #f1f5f9; border-radius: 1.5rem; padding: 1.5rem; margin-bottom: 1rem; box-shadow: 0 4px 15px rgba(10, 25, 49, 0.03); }
        .tag { font-size: 0.65rem; font-weight: 800; padding: 4px 10px; border-radius: 8px; background: #F1F8F5; color: #1E5128; text-transform: uppercase; }
        
        /* 필터 칩 스타일 */
        .filter-chip { flex-shrink: 0; padding: 0.5rem 1.1rem; border-radius: 2rem; font-size: 0.8rem; font-weight: 800; border: 1px solid #e2e8f0; background: white; color: #64748b; transition: all 0.2s; }
        .filter-chip.active { background: #1E5128; color: white; border-color: #1E5128; box-shadow: 0 4px 10px rgba(30, 81, 40, 0.2); }
        
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-[#F8FAFC] text-[#1A202C]">

    <div class="max-w-2xl mx-auto min-h-screen flex flex-col bg-white shadow-xl relative">
        
        <!-- 고정 헤더 -->
        <header class="bg-white/95 backdrop-blur-md px-5 py-4 sticky top-0 z-[100] border-b border-slate-100">
            <div class="flex items-center gap-3 mb-4">
                <button onclick="location.href='index.html'" class="p-2 -ml-2 rounded-full hover:bg-slate-100 transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-[#0A1931]" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path d="M15 19l-7-7 7-7" /></svg>
                </button>
                <h1 id="page-title" class="text-xl font-900 text-[#0A1931]">Missions</h1>
            </div>

            <!-- 지역 필터 슬라이더 -->
            <div class="flex gap-2 overflow-x-auto hide-scrollbar pb-3" id="region-filters"></div>
            <!-- 카테고리 필터 슬라이더 -->
            <div class="flex gap-2 overflow-x-auto hide-scrollbar" id="category-filters"></div>
        </header>

        <main id="mission-container" class="flex-grow p-6 pb-safe overflow-y-auto">
            <div id="loading-spinner" class="flex flex-col items-center justify-center py-20">
                <div class="animate-spin rounded-full h-9 w-9 border-b-2 border-[#1E5128] mb-4"></div>
                <p class="text-slate-400 font-700 text-sm">미션을 불러오는 중...</p>
            </div>
            <div id="mission-items" class="hidden"></div>
        </main>

    </div>

    <script>
        const SUPABASE_URL = 'https://xyyoeovwrkcwhwdmjeyx.supabase.co'; 
        const SUPABASE_KEY = 'sb_publishable_Jm_XX_GapNRJEdlQGBP7hw_JqdtHkjX';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const regions = ['서울', '경기', '강원', '충청', '전라', '경상', '제주', '전국'];
        const categories = ['Food', 'Nature', 'History', 'K-Life'];

        let currentType = '';
        let currentValue = '';

        window.onload = async () => {
            const params = new URLSearchParams(window.location.search);
            currentType = params.get('type') || 'region';
            currentValue = decodeURIComponent(params.get('value') || '서울');

            renderFilterUI();
            await fetchMissions();
        };

        // 필터 UI 렌더링
        function renderFilterUI() {
            const regionContainer = document.getElementById('region-filters');
            const categoryContainer = document.getElementById('category-filters');

            regionContainer.innerHTML = regions.map(r => `
                <button onclick="updateFilter('region', '${r}')" class="filter-chip ${currentType === 'region' && currentValue === r ? 'active' : ''}">${r}</button>
            `).join('');

            categoryContainer.innerHTML = categories.map(c => `
                <button onclick="updateFilter('category', '${c}')" class="filter-chip ${currentType === 'category' && currentValue === c ? 'active' : ''}">${c}</button>
            `).join('');

            document.getElementById('page-title').innerText = currentValue;
        }

        // 필터 업데이트 및 재조회
        async function updateFilter(type, value) {
            currentType = type;
            currentValue = value;
            
            // URL 파라미터 업데이트 (새로고침 없이)
            const newUrl = `${window.location.pathname}?type=${type}&value=${encodeURIComponent(value)}`;
            window.history.pushState({ path: newUrl }, '', newUrl);

            renderFilterUI();
            await fetchMissions();
        }

        async function fetchMissions() {
            const spinner = document.getElementById('loading-spinner');
            const container = document.getElementById('mission-items');
            
            spinner.classList.remove('hidden');
            container.classList.add('hidden');
            container.innerHTML = '';

            const { data, error } = await _supabase
                .from('missions')
                .select('*')
                .eq(currentType, currentValue);
            
            spinner.classList.add('hidden');
            container.classList.remove('hidden');

            if (error || !data || data.length === 0) {
                container.innerHTML = `
                    <div class="py-20 text-center flex flex-col items-center">
                        <span class="text-4xl mb-4">🔍</span>
                        <p class="text-slate-400 font-800">해당 조건의 미션이 없습니다.</p>
                    </div>`;
                return;
            }

            data.forEach(item => {
                const el = document.createElement('div');
                el.className = 'mission-card fade-in';
                el.innerHTML = `
                    <div class="flex justify-between items-start mb-3">
                        <span class="tag">${item.category}</span>
                        <span class="text-[10px] text-slate-400 font-900 uppercase tracking-widest">${item.region}</span>
                    </div>
                    <h4 class="font-900 text-xl mb-2 text-[#0A1931] leading-tight">${item.mission_name}</h4>
                    <p class="text-sm text-slate-500 leading-relaxed mb-6 font-medium">${item.guide || '한국의 고유한 문화를 체험할 수 있는 미션입니다.'}</p>
                    <div class="flex justify-between items-center pt-5 border-t border-slate-50">
                        <div class="flex flex-col">
                            <span class="text-[10px] text-slate-400 font-800 uppercase mb-0.5">Reward</span>
                            <span class="text-[#1E5128] font-900 text-lg">💎 100P</span>
                        </div>
                        <button onclick="acceptMission('${item.mission_id}')" class="bg-[#1E5128] text-white text-sm px-7 py-3 rounded-2xl font-900 shadow-lg shadow-[#1E5128]/10 active:scale-95 transition-all">도전하기</button>
                    </div>
                `;
                container.appendChild(el);
            });
        }

        function acceptMission(id) {
            alert('미션을 수락했습니다! 기록 탭에서 확인할 수 있습니다.');
        }
    </script>
</body>
</html>
