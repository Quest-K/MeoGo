<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MeoGo | 마이페이지</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;900&display=swap');
        body { font-family: 'Pretendard', sans-serif; -webkit-tap-highlight-color: transparent; letter-spacing: -0.02em; }
        .brand-navy { color: #0A1931; } .brand-green { color: #1E5128; }
        .bg-brand-navy { background-color: #0A1931; }
        .nav-item { display: flex; flex-direction: column; align-items: center; font-size: 0.75rem; color: #94a3b8; font-weight: 700; flex: 1; text-decoration: none; }
        .nav-item.active { color: #1E5128; }
        .info-field { background: white; border: 1px solid #f1f5f9; border-radius: 1.25rem; padding: 1.25rem; margin-bottom: 0.75rem; display: flex; justify-content: space-between; align-items: center; }
        .auth-input { width: 100%; padding: 1rem; border: 1px solid #e2e8f0; border-radius: 1rem; margin-bottom: 0.5rem; font-weight: 600; }
    </style>
</head>
<body class="bg-[#F8FAFC] text-[#1A202C]">
    <div class="max-w-2xl mx-auto min-h-screen flex flex-col relative bg-white shadow-2xl">
        <header class="bg-white/95 px-6 py-4 flex justify-between items-center border-b border-slate-100 sticky top-0 z-50">
            <a href="index.html" class="text-2xl font-900 brand-navy tracking-tighter no-underline">MeoGo</a>
            <button id="logout-btn" onclick="handleLogout()" class="text-sm font-700 text-slate-400 hidden">로그아웃</button>
        </header>

        <main class="flex-grow pb-24 px-6">
            <div id="auth-section" class="py-12 hidden">
                <h2 class="text-3xl font-900 brand-navy mb-2 text-center">반가워요! 👋</h2>
                <p class="text-slate-500 font-600 text-center mb-10">미션을 시작하려면 로그인이 필요합니다.</p>
                
                <button onclick="loginWithGoogle()" class="w-full py-4 bg-white border border-slate-200 rounded-2xl font-800 flex items-center justify-center gap-3 mb-4 shadow-sm active:scale-95 transition-all">
                    <img src="https://www.google.com/favicon.ico" class="w-5 h-5">
                    <span>구글 계정으로 시작하기</span>
                </button>

                <div class="flex items-center gap-4 my-6 text-slate-300">
                    <hr class="flex-grow"> <span class="text-xs font-800">또는</span> <hr class="flex-grow">
                </div>

                <input type="email" id="auth-email" placeholder="이메일 주소" class="auth-input">
                <input type="password" id="auth-password" placeholder="비밀번호" class="auth-input">
                <div class="flex gap-2 mt-2">
                    <button onclick="handleEmailAuth('signin')" class="flex-1 py-4 bg-brand-navy text-white rounded-2xl font-800 active:scale-95 transition-all">로그인</button>
                    <button onclick="handleEmailAuth('signup')" class="flex-1 py-4 bg-slate-100 text-slate-600 rounded-2xl font-800 active:scale-95 transition-all">회원가입</button>
                </div>
            </div>

            <div id="profile-section" class="hidden">
                <div class="py-10 flex flex-col items-center">
                    <div class="w-24 h-24 rounded-full bg-slate-100 border-4 border-white shadow-lg overflow-hidden mb-4">
                        <img id="p-avatar" src="https://api.dicebear.com/7.x/avataaars/svg?seed=MeoGo" alt="avatar">
                    </div>
                    <h2 class="text-2xl font-900 brand-navy mb-1" id="display-name">LOADING...</h2>
                    <span class="text-sm font-800 text-brand-green" id="p-points">0 P</span>
                </div>
                <div class="space-y-3">
                    <div class="info-field"><span class="font-700 text-slate-400">닉네임</span><span class="font-800" id="p-nick">-</span></div>
                    <div class="info-field"><span class="font-700 text-slate-400">국가</span><span class="font-800" id="p-country">-</span></div>
                </div>
            </div>
        </main>

        <nav class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-2xl bg-white border-t border-slate-100 px-6 py-4 flex justify-between items-center z-50 rounded-t-[2rem] shadow-2xl">
            <a href="index.html" class="nav-item"><span>미션</span></a>
            <a href="wishlist.html" class="nav-item"><span>찜</span></a>
            <a href="history.html" class="nav-item"><span>기록</span></a>
            <a href="mypage.html" class="nav-item active"><span>마이</span></a>
        </nav>
    </div>

    <script>
        const SUPABASE_URL = 'https://xyyoeovwrkcwhwdmjeyx.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_Jm_XX_GapNRJEdlQGBP7hw_JqdtHkjX';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function checkSession() {
            const { data: { session } } = await _supabase.auth.getSession();
            
            if (session) {
                document.getElementById('auth-section').classList.add('hidden');
                document.getElementById('profile-section').classList.remove('hidden');
                document.getElementById('logout-btn').classList.remove('hidden');
                loadProfile(session.user);
            } else {
                document.getElementById('auth-section').classList.remove('hidden');
                document.getElementById('profile-section').classList.add('hidden');
                document.getElementById('logout-btn').classList.add('hidden');
            }
        }

        // 구글 로그인
        async function loginWithGoogle() {
            const { error } = await _supabase.auth.signInWithOAuth({
                provider: 'google',
                options: { redirectTo: window.location.origin + '/mypage.html' }
            });
            if (error) alert(error.message);
        }

        // 이메일 로그인/회원가입
        async function handleEmailAuth(type) {
            const email = document.getElementById('auth-email').value;
            const password = document.getElementById('auth-password').value;

            if (!email || !password) return alert("이메일과 비밀번호를 입력해주세요.");

            const { data, error } = (type === 'signup') 
                ? await _supabase.auth.signUp({ email, password })
                : await _supabase.auth.signInWithPassword({ email, password });

            if (error) alert(error.message);
            else if (type === 'signup') alert("인증 메일을 확인해주세요!");
            else checkSession();
        }

        async function loadProfile(user) {
            const { data: profile } = await _supabase.from('profiles').select('*').eq('id', user.id).single();
            if (profile) {
                document.getElementById('p-nick').innerText = profile.nickname || '미설정';
                document.getElementById('p-country').innerText = profile.country || '미설정';
                document.getElementById('p-points').innerText = `${profile.total_points || 0} P`;
                document.getElementById('display-name').innerText = (profile.nickname || 'GUEST').toUpperCase();
            }
        }

        async function handleLogout() {
            await _supabase.auth.signOut();
            location.reload();
        }

        window.onload = checkSession;
    </script>
</body>
</html>
